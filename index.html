<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modulus & Floor Division Visualizer</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border: 1px solid #e2e8f0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        h3 {
            margin-top: 0;
            color: #1e293b;
            font-size: 1.2rem;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
            text-align: center;
        }
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #cbd5e1;
        }
        .input-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: bold;
            color: #334155;
        }
        input {
            width: 60px;
            padding: 8px;
            border: 1px solid #94a3b8;
            border-radius: 4px;
            font-size: 1rem;
            text-align: center;
        }
        button {
            background-color: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 1rem;
        }
        button:hover { background-color: #2563eb; }
        .visualizer {
            display: flex;
            gap: 20px;
            justify-content: space-around;
            min-height: 150px;
        }
        .box {
            flex: 1;
            background: #f8fafc;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .box-title {
            font-size: 0.9rem;
            font-weight: bold;
            color: #64748b;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .groups-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }
        .group {
            background: #dbeafe;
            border: 2px solid #3b82f6;
            border-radius: 6px;
            padding: 8px;
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            max-width: 100px;
            justify-content: center;
        }
        .item {
            width: 16px;
            height: 16px;
            background-color: #3b82f6;
            border-radius: 50%;
            display: inline-block;
        }
        .item-remainder {
            background-color: #f59e0b;
        }
        .remainder-container {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 8px;
            background: #fef3c7;
            border: 2px solid #f59e0b;
            border-radius: 6px;
            min-width: 40px;
            min-height: 20px;
        }
        .results {
            display: flex;
            justify-content: space-around;
            gap: 15px;
        }
        .result-card {
            flex: 1;
            background: #1e293b;
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-family: monospace;
            font-size: 1.1rem;
        }
        .highlight-floor { color: #60a5fa; font-weight: bold; font-size: 1.3rem; }
        .highlight-mod { color: #fbbf24; font-weight: bold; font-size: 1.3rem; }
        .explanation {
            background: #e0f2fe;
            border-left: 4px solid #0284c7;
            padding: 15px;
            border-radius: 4px;
            color: #0369a1;
            font-size: 0.95rem;
            text-align: center;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <h3>Modulus & Floor Division Visualizer</h3>
    
    <div class="controls">
        <div class="input-group">
            <label for="dividend">Total Items:</label>
            <input type="number" id="dividend" value="14" min="1" max="50">
        </div>
        <div style="font-size: 1.5rem; color: #94a3b8;">÷</div>
        <div class="input-group">
            <label for="divisor">Group Size:</label>
            <input type="number" id="divisor" value="4" min="1" max="20">
        </div>
        <button onclick="calculate()">Visualize</button>
    </div>

    <div class="visualizer">
        <div class="box">
            <div class="box-title">Complete Groups (//)</div>
            <div class="groups-container" id="groups-container"></div>
        </div>
        <div class="box" style="flex: 0.5;">
            <div class="box-title">Leftovers (%)</div>
            <div class="remainder-container" id="remainder-container"></div>
        </div>
    </div>

    <div class="results">
        <div class="result-card">
            <div style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; font-family: sans-serif;">Standard Division</div>
            <span id="res-div">14 / 4 = 3.5</span>
        </div>
        <div class="result-card">
            <div style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; font-family: sans-serif;">Floor Division</div>
            <span id="res-floor">14 // 4 = <span class="highlight-floor">3</span></span>
        </div>
        <div class="result-card">
            <div style="font-size: 0.8rem; color: #94a3b8; margin-bottom: 5px; font-family: sans-serif;">Modulus (Remainder)</div>
            <span id="res-mod">14 % 4 = <span class="highlight-mod">2</span></span>
        </div>
    </div>

    <div class="explanation" id="explanation">
        Click <b>Visualize</b> to see how 14 items are divided into groups of 4.
    </div>
</div>

<script>
    function calculate() {
        const dividend = parseInt(document.getElementById('dividend').value);
        const divisor = parseInt(document.getElementById('divisor').value);

        if (isNaN(dividend) || isNaN(divisor) || divisor <= 0 || dividend <= 0) {
            alert("Please enter valid positive numbers.");
            return;
        }

        const floorResult = Math.floor(dividend / divisor);
        const modResult = dividend % divisor;
        const standardResult = (dividend / divisor).toFixed(2).replace(/\.00$/, '');

        // Render Groups
        const groupsContainer = document.getElementById('groups-container');
        groupsContainer.innerHTML = '';
        for (let i = 0; i < floorResult; i++) {
            const group = document.createElement('div');
            group.className = 'group';
            for (let j = 0; j < divisor; j++) {
                const item = document.createElement('div');
                item.className = 'item';
                group.appendChild(item);
            }
            groupsContainer.appendChild(group);
        }

        // Render Remainder
        const remainderContainer = document.getElementById('remainder-container');
        remainderContainer.innerHTML = '';
        for (let i = 0; i < modResult; i++) {
            const item = document.createElement('div');
            item.className = 'item item-remainder';
            remainderContainer.appendChild(item);
        }

        // Update Text
        document.getElementById('res-div').textContent = `${dividend} / ${divisor} = ${standardResult}`;
        document.getElementById('res-floor').innerHTML = `${dividend} // ${divisor} = <span class="highlight-floor">${floorResult}</span>`;
        document.getElementById('res-mod').innerHTML = `${dividend} % ${divisor} = <span class="highlight-mod">${modResult}</span>`;

        // Update Explanation
        document.getElementById('explanation').innerHTML = `Floor Division (<code>//</code>) tells us we can make <b>${floorResult}</b> complete groups. The Modulus operator (<code>%</code>) tells us there are <b>${modResult}</b> items left over!`;
    }

    // Initialize on load
    calculate();
</script>

</body>
</html>
